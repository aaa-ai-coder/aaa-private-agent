name: Android release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build universal APK
        run: |
          flutter build apk --release
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/app-universal-release.apk

      - name: Build architecture-specific APKs
        run: |
          flutter build apk --release --split-per-abi
          mkdir -p dist/split
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/split/
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/split/
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk dist/split/
          cd dist/split
          sha256sum *.apk > SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: private-agent-android
          path: |
            dist/app-universal-release.apk
            dist/split/*.apk
            dist/split/SHA256SUMS.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/app-universal-release.apk
            dist/split/*.apk
          name: "AAA Private Agent ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
