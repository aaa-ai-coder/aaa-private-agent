name: Build & Release APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Release Keystore
        run: |
          keytool -genkey -v -keystore android/app/release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass privateagent123 -keypass privateagent123 -dname "CN=AAA Private Agent, OU=Agent, O=AAA, L=City, S=State, C=US"

      - name: Ensure google-services.json exists
        run: |
          if [ ! -f "android/app/google-services.json" ]; then
            echo '{"project_info":{"project_number":"844358886395","project_id":"aaa-private-agent","storage_bucket":"aaa-private-agent.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:844358886395:android:a1b2c3d4e5f6g7h8","android_client_info":{"package_name":"com.aaa.privateagent"}},"oauth_client":[{"client_id":"844358886395-tsh4o7eo55r14e6cbrs6oc1faisu6l33.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"AIzaSyDummyKeyForAAAAppBuild123456"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > android/app/google-services.json
          fi

      - name: Build Release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/AAA-Private-Agent.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AAA-Private-Agent-APK
          path: build/app/outputs/flutter-apk/AAA-Private-Agent.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/AAA-Private-Agent.apk
          name: "AAA Private Agent ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
